<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Library Test</title>
  <link rel="stylesheet" href="media-library.css">

  <!-- CRITICAL: Set Nexter config BEFORE any module imports -->
  <script>
    // Set Nexter config with IMS Client ID
    // Must run before media-library loads to avoid "Missing IMS Client ID" error
    window.c = {
      imsClientId: 'da-web',
      env: 'prod',
      nxBase: 'https://da.live/nx'
    };
  </script>
</head>
<body>
  <div id="ml-container"></div>

  <script type="module">
    // Import DA SDK to get org/repo context and auth
    import DA_SDK from 'https://da.live/nx/utils/sdk.js';

    // Load bundled media-library plugin to define the custom element
    await import('./media-library-plugin.js');

    // Wait for custom element to be defined
    await customElements.whenDefined('nx-media-library');

    // Get context from DA SDK
    const { context, actions } = await DA_SDK;

    // Create the element and set sitePath BEFORE adding to DOM
    const ml = document.createElement('nx-media-library');
    ml.id = 'ml';
    ml.sitePath = `/${context.org}/${context.repo}`;

    // NOW add it to the DOM - it will initialize with sitePath already set
    document.getElementById('ml-container').appendChild(ml);

    console.log('✅ Media library plugin loaded (bundled locally)');
    console.log(`📍 Site: ${ml.sitePath} (from DA context)`);
    console.log('🔐 Auth token: automatically handled by media-library via IMS');
    console.log('📍 Mode detection: URL-based (app vs plugin)');
    console.log('🔍 POC: Proving same codebase can be bundled for plugin use');
  </script>
</body>
</html>
