<!DOCTYPE html>
<!-- ml-plugin rev: TEST-medialib-plugin-branch — NX imports from medialib-plugin branch for testing -->
<html lang="en" data-ml-plugin-rev="TEST-medialib-plugin-branch">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Library · plugin TEST</title>
  <link rel="stylesheet" href="media-library.css">

  <script type="importmap">
    {
      "imports": {
        "da-lit": "https://da.live/nx/deps/lit/dist/index.js"
      }
    }
  </script>
</head>
<body>
  <div class="nx-app">
    <main id="ml-container"></main>
  </div>

  <script type="module">
    const PLUGIN_REV = 'TEST-medialib-plugin-branch';
    console.info(`[ml-plugin] ${PLUGIN_REV} — Loading from medialib-plugin branch`);

    import { setConfig } from 'https://da.live/nx/scripts/nexter.js';
    import DA_SDK from 'https://da.live/nx/utils/sdk.js';

    setConfig({ imsClientId: 'da-web', env: 'prod' });

    // Get token from SDK
    const { context, token } = await DA_SDK;
    console.info('[ml-plugin] Got token from SDK:', token ? 'YES' : 'NO');

    // Import setImsDetails from nx daFetch
    const { setImsDetails } = await import('https://medialib-plugin--da-nx--adobe.aem.live/nx/utils/daFetch.js');

    // Inject token before loading media-library
    if (token) {
      setImsDetails(token);
      console.info('[ml-plugin] Token injected via setImsDetails');
    } else {
      console.warn('[ml-plugin] No token from SDK!');
    }

    await import('https://medialib-plugin--da-nx--adobe.aem.live/nx/blocks/media-library/media-library.js');

    const ml = document.createElement('nx-media-library');
    const org = context?.org;
    const repo = context?.repo;
    ml.sitePath = org && repo ? `/${org}/${repo}` : '';

    document.getElementById('ml-container').appendChild(ml);
  </script>
</body>
</html>
