<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Library</title>
  <!-- Tokens first; plugin overrides must load after nexter (shell grid / main scroll). -->
  <link rel="stylesheet" href="https://da.live/nx/styles/nexter.css?nx=mldecouple" />
  <link rel="stylesheet" href="media-library.css">

  <!-- Nexter branch preview: same ?nx= on every da.live/nx module URL so CDN serves one branch. -->
  <script type="importmap">
    {
      "imports": {
        "da-lit": "https://da.live/nx/deps/lit/dist/index.js?nx=mldecouple"
      }
    }
  </script>
</head>
<body>
  <div class="nx-app">
    <main id="ml-container"></main>
  </div>

  <script type="module">
    import { setConfig } from 'https://da.live/nx/scripts/nexter.js?nx=mldecouple';
    import DA_SDK from 'https://da.live/nx/utils/sdk.js?nx=mldecouple';

    // Must run before any import of ims (pulled in by the media-library block)
    setConfig({ imsClientId: 'da-web', env: 'prod' });

    // Diagnostic + guard: some DA wrappers may use `/apps/media-library` in the iframe URL,
    // which triggers app-only auto-index rebuild behavior in the component.
    // We neutralize that by rewriting the visible path (no reload) to avoid the substring match.
    console.log('[media-library plugin] location:', {
      href: window.location.href,
      pathname: window.location.pathname,
      inIframe: window.self !== window.top,
    });
    if (window.location.pathname.includes('/apps/media-library')) {
      history.replaceState(
        null,
        document.title,
        window.location.href.replace('/apps/media-library', '/apps/media-library-plugin'),
      );
      console.log('[media-library plugin] rewrote pathname for plugin mode:', window.location.pathname);
    }

    await import('https://da.live/nx/blocks/media-library/media-library.js?nx=mldecouple');

    await customElements.whenDefined('nx-media-library');

    const { context } = await DA_SDK;

    const ml = document.createElement('nx-media-library');
    ml.id = 'ml';

    const org = context?.org;
    const repo = context?.repo;
    if (!org || !repo) {
      console.error('[media-library plugin] Missing context.org / context.repo', context);
      ml.sitePath = '';
    } else {
      ml.sitePath = `/${org}/${repo}`;
    }

    document.getElementById('ml-container').appendChild(ml);
  </script>
</body>
</html>
